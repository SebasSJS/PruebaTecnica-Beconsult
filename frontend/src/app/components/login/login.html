<div class="login-container">
    <div class="login-card">
      <h2>Bienvenido a Beconsult</h2>
      <p>Ingresa tus credenciales para continuar</p>
  
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" formControlName="username">
          
          <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error-text">
            El usuario es obligatorio.
          </div>
        </div>
  
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" formControlName="password">
          
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-text">
            La contraseña es obligatoria.
          </div>
        </div>
  
        <button type="submit" class="btn-login" [disabled]="loginForm.invalid">Iniciar Sesión</button>
        
        <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
      </form>
    </div>
  </div>
